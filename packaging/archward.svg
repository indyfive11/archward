<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <title>archward</title>
  <desc>Safe-update guard for Arch-based Linux distributions</desc>

  <!-- Shield body -->
  <path d="M 128 20
           L 36 52
           L 36 132
           C 36 188 72 224 128 240
           C 184 224 220 188 220 132
           L 220 52
           Z"
        fill="#2c5aa0"
        stroke="#1e3a5f"
        stroke-width="6"
        stroke-linejoin="round"/>

  <!-- Inner highlight to give the shield a soft surface -->
  <path d="M 128 36
           L 50 64
           L 50 128
           C 50 176 80 210 128 224
           C 176 210 206 176 206 128
           L 206 64
           Z"
        fill="none"
        stroke="#4a7bb6"
        stroke-width="3"
        opacity="0.7"/>

  <!-- Circular update arrow centered on the shield -->
  <path d="M 96 142
           A 36 36 0 1 1 156 152"
        fill="none"
        stroke="#ffffff"
        stroke-width="14"
        stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="146,140 174,154 158,168" fill="#ffffff"/>

  <!-- Tiny checkmark below the arrow to convey "verified" -->
  <path d="M 108 184
           L 122 198
           L 152 168"
        fill="none"
        stroke="#ffffff"
        stroke-width="9"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
