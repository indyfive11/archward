<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <title>archward</title>
  <desc>Safe-update guard for Arch-based Linux distributions</desc>

  <!-- ── Shield body ───────────────────────────────────────────────────
       Classic heraldic shield: flat top, curved sides that narrow to a
       rounded point. Sized inside a 32px safe margin so the icon stays
       legible at 22px launcher sizes without the stroke clipping. -->
  <path d="M 128 28
           L 40 56
           L 40 132
           C 40 188 76 224 128 240
           C 180 224 216 188 216 132
           L 216 56
           Z"
        fill="#0e7490"
        stroke="#083344"
        stroke-width="6"
        stroke-linejoin="round"/>

  <!-- Subtle inner edge to give the shield depth without gradients
       (gradients dither poorly at 22-32px). -->
  <path d="M 128 44
           L 54 68
           L 54 130
           C 54 178 84 208 128 222
           C 172 208 202 178 202 130
           L 202 68
           Z"
        fill="none"
        stroke="#14b8c4"
        stroke-width="2.5"
        opacity="0.55"/>

  <!-- ── Arch silhouette (stylized tetrahedron) ────────────────────────
       Simplified to two clean strokes: outer triangle + an inner
       triangle hint. Reads as the Arch motif at every size without
       needing the three-faced 3D rendering of the official logo. -->

  <!-- Outer triangle outline -->
  <path d="M 128 86
           L 86 174
           L 170 174
           Z"
        fill="#ffffff"
        stroke="#ffffff"
        stroke-width="2"
        stroke-linejoin="round"/>

  <!-- Inner negative-space triangle (cut into the white face so the
       teal shield shows through, suggesting the Arch tetrahedron's
       inner facet). -->
  <path d="M 128 122
           L 110 162
           L 146 162
           Z"
        fill="#0e7490"
        stroke="none"/>
</svg>
